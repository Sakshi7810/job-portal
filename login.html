<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-900 flex justify-center items-center h-screen">

<div class="bg-white p-6 rounded w-80">
  <h2 class="text-xl font-bold mb-4">Login</h2>

  <input id="email" type="email" placeholder="Email" class="w-full p-2 mb-3 border">
  <input id="password" type="password" placeholder="Password" class="w-full p-2 mb-3 border">

  <button onclick="login()" class="w-full bg-blue-900 text-white p-2">Login</button>
</div>

<script src="js/script.js"></script>
</body>
</html>
